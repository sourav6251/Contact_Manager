<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your OTP Code</title>
  <style>
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #121212 !important;
        color: #ffffff !important;
      }
      .card {
        background-color: #1e1e1e !important;
        border-color: #333 !important;
      }
      .otp-box {
        background-color: #333 !important;
        color: #fff !important;
      }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; color: #333;">
<table width="100%" cellpadding="0" cellspacing="0" style="padding: 20px;">
  <tr>
    <td align="center">
      <table width="600" cellpadding="0" cellspacing="0" class="card" style="background-color: #ffffff; border-radius: 12px; padding: 40px; border: 1px solid #ddd;">
        <tr>
          <td align="center" style="padding-bottom: 20px;">
            <h2 style="margin: 0; color: #2563eb;">🔐 One-Time Password (OTP)</h2>
          </td>
        </tr>
        <tr>
          <td style="font-size: 16px; line-height: 1.6;">
            <p>Hi <strong>{{name}}</strong>,</p>
            <p>Here is your one-time password (OTP). Use it to verify your account. This OTP is valid for <strong>10 minutes</strong>.</p>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding: 30px 0;">
            <div class="otp-box" style="font-size: 24px; letter-spacing: 8px; font-weight: bold; background-color: #e5e7eb; color: #111827; padding: 16px 32px; border-radius: 10px; display: inline-block;">
              {{otp}}
            </div>
          </td>
        </tr>
        <tr>
          <td style="font-size: 14px; color: #666; text-align: center;">
            <p>Didn't request this OTP? Ignore this email or <a href="{{supportLink}}" style="color: #2563eb;">contact support</a>.</p>
            <p style="margin-top: 30px;">— The CollegeConnect Team</p>
          </td>
        </tr>
      </table>
      <p style="font-size: 12px; color: #aaa; text-align: center; margin-top: 20px;">
        © 2025 CollegeConnect. All rights reserved.
      </p>
    </td>
  </tr>
</table>
</body>
</html>
